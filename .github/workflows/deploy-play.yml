name: Deploy to Play

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track"
        required: true
        default: production
        type: choice
        options:
          - production

concurrency:
  group: deploy-play
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Run unit tests
        run: ./gradlew testPlayDebugUnitTest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: play-store

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.jks

      - name: Build release AAB
        run: ./gradlew bundlePlayRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@eb49699984a39f23558439581660aa6f088acfd6 # v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: okoge.house.throttling_app.play
          releaseFiles: app/build/outputs/bundle/playRelease/app-play-release.aab
          track: ${{ inputs.track }}
